name: Release APK

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v0.1.0)"
        required: true

jobs:
  detect:
    name: Detect release trigger
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.t.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve tag
        id: t
        run: |
          set -e
          case "${{ github.event_name }}" in
            workflow_dispatch)
              echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
              ;;
            push)
              if [[ "$GITHUB_REF" == refs/tags/* ]]; then
                echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
              else
                NEW=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || true)
                OLD=$(git show HEAD~1:app/build.gradle.kts 2>/dev/null | grep -oP 'versionName\s*=\s*"\K[^"]+' || true)
                echo "Detected versionName: old='$OLD' new='$NEW'"
                if [ -n "$NEW" ] && [ "$NEW" != "$OLD" ]; then
                  TAG="v$NEW"
                  if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                    echo "Release $TAG already exists, skipping."
                  else
                    echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  fi
                fi
              fi
              ;;
          esac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Build and publish signed release
    needs: detect
    if: needs.detect.outputs.tag != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so generate_release_notes can diff against the previous tag.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0 platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is empty"; exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
          echo "RELEASE_KEYSTORE_FILE=release.keystore" >> "$GITHUB_ENV"

      - name: Assemble release APK
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Rename APK
        id: rename
        run: |
          SRC=app/build/outputs/apk/release/app-release.apk
          DEST="widget-ftmo-${{ needs.detect.outputs.tag }}.apk"
          test -f "$SRC" || { echo "::error::Expected APK at $SRC"; ls -la app/build/outputs/apk/release/ || true; exit 1; }
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          name: ${{ needs.detect.outputs.tag }}
          files: ${{ steps.rename.outputs.path }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore
        if: always()
        run: rm -f app/release.keystore
